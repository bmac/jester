/gist.github.com/2a6851cde24cdaf4b85b","createdAt":"2014-07-03T19:33:02Z","updatedAt":"2024-05-17T23:04:40Z","files":[{"name":"ssh_key_add.sh","text":"# Note: ~/.ssh/environment should not be used, as it\n#       already has a different purpose in SSH.\n\nenv=~/.ssh/agent.env\n\n# Note: Don''t bother checking SSH_AGENT_PID. It''s not used\n#       by SSH itself, and it might even be incorrect\n#       (for example, when using agent-forwarding over SSH).\n\nagent_is_running() {\n    if [ \"$SSH_AUTH_SOCK\" ]; then\n        # ssh-add returns:\n        #   0 = agent running, has keys\n        #   1 = agent running, no keys\n        #   2 = agent not running\n        # if your keys are not stored in ~/.ssh/id_rsa.pub or ~/.ssh/id_dsa.pub, you''ll need\n        # to paste the proper path after ssh-add\n        ssh-add -l >/dev/null 2>&1 || [ $? -eq 1 ]\n    else\n        false\n    fi\n}\n\nagent_has_keys() {\n    # if your keys are not stored in ~/.ssh/id_rsa.pub or ~/.ssh/id_dsa.pub, you''ll need\n    # to paste the proper path after ssh-add\n    ssh-add -l >/dev/null 2>&1\n}\n\nagent_load_env() {\n    . \"$env\" >/dev/null\n}\n\nagent_start() {\n    (umask 077; ssh-agent >\"$en","language":{"name":"Shell"}}]},{"id":"MDQ6R2lzdDA4MzFmM2ZiZDgzYWM0ZDQ2NDUx","name":"0831f3fbd83ac4d46451","description":"","stargazerCount":246,"url":"https://gist.github.com/0831f3fbd83ac4d46451","createdAt":"2014-07-23T23:15:04Z","updatedAt":"2024-05-27T16:11:02Z","files":[{"name":"git-author-rewrite.sh","text":"#!/bin/sh\n\ngit filter-branch --env-filter ''\n\nOLD_EMAIL=\"your-old-email@example.com\"\nCORRECT_NAME=\"Your Correct Name\"\nCORRECT_EMAIL=\"your-correct-email@example.com\"\n\nif [ \"$GIT_COMMITTER_EMAIL\" = \"$OLD_EMAIL\" ]\nthen\n    export GIT_COMMITTER_NAME=\"$CORRECT_NAME\"\n    export GIT_COMMITTER_EMAIL=\"$CORRECT_EMAIL\"\nfi\nif [ \"$GIT_AUTHOR_EMAIL\" = \"$OLD_EMAIL\" ]\nthen\n    export GIT_AUTHOR_NAME=\"$CORRECT_NAME\"\n    export GIT_AUTHOR_EMAIL=\"$CORRECT_EMAIL\"\nf